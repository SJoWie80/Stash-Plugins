name: Funscript Generator
description: Queue selected Stash scenes for local funscript generation.
version: 0.1.0
url: https://github.com/SJoWie80/Stash-Plugins
exec:
  - python
  - "{pluginDir}/funscript_generator_backend.py"
interface: raw
tasks:
  - name: queue
    description: Manage the funscript generation queue.
ui:
  javascript:
    - funscript-generator.js
  css:
    - funscript-generator.css
