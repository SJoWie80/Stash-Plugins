name: Spotweb Studio Downloads
description: Zoek Spotweb NZB's per Stash-studio en stuur ontbrekende releases naar SABnzbd.
version: 0.1.7
url: https://github.com/SJoWie80/Stash-Plugins
exec:
  - python
  - "{pluginDir}/spotweb_studio_backend.py"
interface: raw
tasks:
  - name: search
    description: Zoek releases in Spotweb.
  - name: add
    description: Voeg een Spotweb NZB toe aan SABnzbd.
ui:
  javascript:
    - spotweb-studio.js
  css:
    - spotweb-studio.css
