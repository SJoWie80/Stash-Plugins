name: Now Playing
description: Shows active Stash playback from browser sessions and server-side scene activity.
version: 1.2.2
url: https://github.com/SJoWie80/Stash-Plugins
exec:
  - python
  - "{pluginDir}/now_playing_backend.py"
interface: raw
tasks:
  - name: state
    description: Store and read Now Playing heartbeat state.
ui:
  javascript:
    - now-playing.js
  css:
    - now-playing.css
