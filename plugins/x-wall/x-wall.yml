name: X Wall
description: Shows X profile timelines for favorite performers with Twitter/X URLs.
version: 0.1.2
url: https://github.com/SJoWie80/Stash-Plugins
interface: raw
ui:
  javascript:
    - x-wall.js
  css:
    - x-wall.css
  csp:
    script-src:
      - https://platform.twitter.com
      - https://platform.x.com
    frame-src:
      - https://platform.twitter.com
      - https://platform.x.com
      - https://syndication.twitter.com
      - https://x.com
      - https://twitter.com
    connect-src:
      - "'self'"
      - https://platform.twitter.com
      - https://platform.x.com
      - https://syndication.twitter.com
      - https://cdn.syndication.twimg.com
      - https://x.com
      - https://twitter.com
    img-src:
      - "'self'"
      - data:
      - https://*.twimg.com
      - https://pbs.twimg.com
