name: Chaturbate
description: Browse and watch Chaturbate cams inside Stash.
version: 1.3.5
url: https://github.com/SJoWie80/Stash-Plugins
exec:
  - python
  - "{pluginDir}/chaturbate_backend.py"
interface: raw
tasks:
  - name: stream
    description: Get a Chaturbate HLS stream URL for a room.
ui:
  javascript:
    - chaturbate.js
  css:
    - chaturbate.css
  csp:
    script-src:
      - https://cdn.jsdelivr.net
    connect-src:
      - https://chaturbate.com
      - https://*.chaturbate.com
      - https://cdn.jsdelivr.net
      - https://*.mmcdn.com
      - https://*.highwebmedia.com
